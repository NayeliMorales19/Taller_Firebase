<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title> Firebase Taller</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem;
    }

    h1 {
      color: #ffca28;
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
    }

    p.sub {
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 0.5rem 0.8rem;
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      background: #ff8f00;
      border: none;
      border-radius: 6px;
      color: #0f172a;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 0.5rem 1.2rem;
    }

    button:hover {
      background: #ffca28;
    }

    button.secondary {
      background: #1e3a5f;
      color: #f1f5f9;
      border: 1px solid #2563eb;
    }

    button.secondary:hover {
      background: #2563eb;
    }

    #resultado {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      min-height: 120px;
    }

    .tarea {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tarea .titulo {
      font-weight: bold;
      color: #ffca28;
    }

    .tarea .desc {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 0.2rem;
    }

    .tarea .id {
      font-size: 0.75rem;
      color: #475569;
      font-family: monospace;
    }

    .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: bold;
    }

    .badge.ok {
      background: #166534;
      color: #4ade80;
    }

    .badge.no {
      background: #7f1d1d;
      color: #f87171;
    }

    .error {
      color: #f87171;
      font-size: 0.95rem;
    }

    .vacio {
      color: #64748b;
      text-align: center;
      padding: 2rem;
    }

    pre {
      color: #7dd3fc;
      font-size: 0.85rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>Firebase Taller</h1>
  <p class="sub">Consulta tu colección <code>tareas</code> en Firestore desde el navegador</p>

  <!-- Listar todas -->
  <div class="controls">
    <button onclick="listarTareas()">Listar todas las tareas</button>
  </div>

  <!-- Buscar por ID -->
  <div class="controls">
    <input id="inputId" type="text" placeholder="ID de la tarea">
    <button onclick="buscarPorId()">Buscar por ID</button>
    <button class="secondary" onclick="limpiar()">Limpiar</button>
  </div>

  <div id="resultado">
    <p class="vacio">Presiona un botón para consultar Firestore</p>
  </div>

  <script>
    const API = "http://localhost:4000";

    async function listarTareas() {

      mostrar("<p style='color:#94a3b8'>Consultando Firestore...</p>");

      try {
        const res = await fetch(`${API}/tareas`);
        const data = await res.json();
        if (!data.length) return mostrar("<p class='vacio'>No hay tareas en la colección.</p>");
        mostrar(data.map(tarjeta).join(""));
      } catch (e) {
        mostrar(`<p class="error"> Error: ${e.message}. ¿Está corriendo el servidor?</p>`);
      }
    }

    async function buscarPorId() {
      const id = document.getElementById("inputId").value.trim();
      if (!id) return mostrar("<p class='error'> Ingresa un ID primero.</p>");
      mostrar("<p style='color:#94a3b8'>Consultando Firestore...</p>");
      try {
        const res = await fetch(`${API}/tareas/${id}`);
        const data = await res.json();
        if (data.error) return mostrar(`<p class="error"> ${data.error}</p>`);
        mostrar(tarjeta(data) + "<hr style='border-color:#334155;margin:1rem 0'><pre>" + JSON.stringify(data, null, 2) + "</pre>");
      } catch (e) {
        mostrar(`<p class="error">Error: ${e.message}. ¿Está corriendo el servidor?</p>`);
      }
    }

    function tarjeta(t) {
      const estado = t.completada
        ? `<span class="badge ok">Completada</span>`
        : `<span class="badge no">Pendiente</span>`;
      return `
      <div class="tarea">
        <div>
          <div class="titulo">${t.titulo || "Sin título"}</div>
          <div class="desc">${t.descripcion || "—"}</div>
          <div class="id">ID: ${t.id}</div>
        </div>
        ${estado}
      </div>`;
    }

    function mostrar(html) { document.getElementById("resultado").innerHTML = html; }

    function limpiar() { document.getElementById("inputId").value = ""; 
    mostrar("<p class='vacio'>Presiona un botón para consultar Firestore</p>"); }
  </script>
</body>

</html>
